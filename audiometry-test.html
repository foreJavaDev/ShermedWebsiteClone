<script>
const FREQS = ['500','750','1k','1.5k','2k','3k','4k','6k','8k'];
const FREQ_HZ = [500,750,1000,1500,2000,3000,4000,6000,8000];

let page = 'otoscopic'; // 'otoscopic' | 'audiometry'
let leftVals = Array(9).fill('');
let rightVals = Array(9).fill('');
let baselineLeft = [10,5,25,10,30,20,10,40,30];
let baselineRight = [10,20,35,50,20,10,40,20,10];
let testStatus = 'Pending'; // 'Pending' | 'Completed'

function render() {
    if (page === 'otoscopic') renderOtoscopic();
    else renderAudiometry();
}

// ============================================================
// OTOSCOPIC EXAMINATION PAGE
// ============================================================

// ============================================================

            <div class="text-xs text-gray-500"><p class="font-medium text-gray-700">ID/Passport No</p><p>000000000000</p></div>
            <div class="text-xs text-gray-500"><p class="font-medium text-gray-700">Date of Birth</p><p>01/01/1991</p></div>

// ============================================================
// CANVAS AUDIOGRAM
// ============================================================
function drawChart(canvasId, vals, color, marker) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const pad = {top:25, bottom:40, left:50, right:15};
    const gW = W - pad.left - pad.right;
    const gH = H - pad.top - pad.bottom;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    // dB range: -10 to 100
    const dbMin = -10, dbMax = 100;
    const dbRange = dbMax - dbMin;

    // Grid lines
    ctx.strokeStyle = '#e5e5e5';
    ctx.lineWidth = 0.5;
    for (let db = dbMin; db <= dbMax; db += 10) {
        const y = pad.top + ((db - dbMin) / dbRange) * gH;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
        ctx.fillStyle = '#999'; ctx.font = '10px Poppins'; ctx.textAlign = 'right';
        ctx.fillText(db, pad.left - 6, y + 3);
    }

    // Vertical grid + freq labels
    FREQS.forEach((f, i) => {
        const x = pad.left + (i / (FREQS.length - 1)) * gW;
        ctx.strokeStyle = '#e5e5e5'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, H - pad.bottom); ctx.stroke();
        ctx.fillStyle = '#999'; ctx.font = '10px Poppins'; ctx.textAlign = 'center';
        ctx.fillText(f, x, H - pad.bottom + 16);
    });

    // Axis labels
    ctx.save();
    ctx.fillStyle = '#A20F0F'; ctx.font = '11px Poppins'; ctx.textAlign = 'center';
    ctx.fillText('Frequency (Hz)', W / 2, H - 4);
    ctx.translate(12, H / 2); ctx.rotate(-Math.PI / 2);
    ctx.fillText('Hearing Level (dB)', 0, 0);
    ctx.restore();

    // Plot data points
    const numVals = vals.map(v => v === '' ? null : parseFloat(v));
    const points = [];
    numVals.forEach((v, i) => {
        if (v !== null && !isNaN(v)) {
            const x = pad.left + (i / (FREQS.length - 1)) * gW;
            const y = pad.top + ((v - dbMin) / dbRange) * gH;
            points.push({x, y, v});
        }
    });

    if (points.length > 1) {
        ctx.strokeStyle = color; ctx.lineWidth = 2;
        ctx.beginPath();
        points.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
        ctx.stroke();
    }

    points.forEach(p => {
        if (marker === 'X') {
            ctx.strokeStyle = color; ctx.lineWidth = 2.5;
            const s = 6;
            ctx.beginPath(); ctx.moveTo(p.x - s, p.y - s); ctx.lineTo(p.x + s, p.y + s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p.x + s, p.y - s); ctx.lineTo(p.x - s, p.y + s); ctx.stroke();
        } else {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2); ctx.fill();
        }
    });
}

// ============================================================
// INTERACTIONS
// ============================================================
function updateVal(side, idx, val) {
    if (side === 'left') leftVals[idx] = val;
    else rightVals[idx] = val;
    drawChart(side === 'left' ? 'chartLeft' : 'chartRight', side === 'left' ? leftVals : rightVals, side === 'left' ? '#2563eb' : '#A20F0F', side === 'left' ? 'X' : '●');
}

function runTest() {
    // Simulate test with sample data
    leftVals = [10,5,25,10,30,20,10,40,30];
    rightVals = [10,20,35,50,20,10,40,20,10];
    testStatus = 'Completed';
    renderAudiometry();
}

function clearTest() {
    leftVals = Array(9).fill('');
    rightVals = Array(9).fill('');

    renderAudiometry();
}
