<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHERmed - Vision Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{font-family:'Poppins',sans-serif}
        /* Stepper */
        .step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;transition:all .3s;border:2px solid #ccc;color:#999;background:#fff}
        .step-dot.active{background:#222;color:#fff;border-color:#222}
        .step-dot.done{background:#A20F0F;color:#fff;border-color:#A20F0F}
        .step-line{height:2px;width:40px;background:#ccc;transition:background .3s}
        .step-line.done{background:#A20F0F}
        .step-lbl{font-size:10px;color:#999;margin-top:4px;text-align:center;white-space:nowrap}
        .step-lbl.active-lbl{color:#A20F0F;font-weight:600}
        /* Question box */
        .q-box{background:#fefce8;border:1.5px solid #fde68a;border-radius:12px;padding:24px 28px}
        /* Cards */
        .acu-card{border:1.5px solid #e5e5e5;border-radius:10px;padding:12px 16px;cursor:pointer;transition:all .2s;background:#f9f9f9;display:flex;justify-content:space-between;align-items:center}
        .acu-card:hover{border-color:#A20F0F;background:#fef2f2}
        .acu-card.picked{border-color:#2563eb;background:#eff6ff}
        .nr-card{border:1.5px solid #e5e5e5;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px}
        .nr-card:hover{border-color:#A20F0F}
        .nr-card.picked{border-color:#A20F0F;background:#fef2f2}
        .resp-btn{border:1.5px solid #e5e5e5;border-radius:10px;padding:14px 24px;cursor:pointer;transition:all .2s;background:#f9f9f9;font-size:13px;font-weight:500;text-align:center;flex:1}
        .resp-btn:hover{border-color:#A20F0F;background:#fef2f2}
        .resp-btn.picked{border-color:#A20F0F;background:#A20F0F;color:#fff}
        .med-card{border:1.5px solid #e5e5e5;border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;background:#fff}
        .med-card:hover{border-color:#A20F0F}
        .med-card.picked{border-color:#A20F0F;background:#A20F0F;color:#fff}
        .med-card.picked .mi{color:#fff!important}
        .shape-card{border:1.5px solid #e5e5e5;border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;background:#fff;text-align:center;min-width:110px}
        .shape-card:hover{border-color:#A20F0F;background:#f9f9f9}
        .shape-card.picked{border-color:#A20F0F;background:#f1f1f1}
        .fusion-card{border:1.5px solid #e5e5e5;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;background:#fff;text-align:center;min-width:100px}
        .fusion-card:hover{border-color:#A20F0F;background:#fef2f2}
        .fusion-card.picked{border-color:#A20F0F;background:#fef2f2}
        .contrast-card{border:1.5px solid #e5e5e5;border-radius:10px;padding:14px 20px;cursor:pointer;transition:all .2s;background:#f9f9f9;text-align:center;font-size:13px}
        .contrast-card:hover{border-color:#A20F0F;background:#fef2f2}
        .contrast-card.picked{border-color:#A20F0F;background:#A20F0F;color:#fff}
        /* Phoria radio */
        .ph-dot{width:22px;height:22px;border-radius:50%;border:2px solid #ccc;cursor:pointer;transition:all .2s;flex-shrink:0}
        .ph-dot:hover{border-color:#A20F0F}
        .ph-dot.picked{border-color:#A20F0F;background:#A20F0F}
        /* Light buttons */
        .light-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e5e5e5;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .light-btn:hover,.light-btn.on{background:#A20F0F;border-color:#A20F0F}
        .light-btn:hover svg,.light-btn.on svg{stroke:#fff}
        /* Checkbox */
        .cb{width:18px;height:18px;border:2px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;cursor:pointer}
        .cb.on{background:#A20F0F;border-color:#A20F0F}
        /* Ref image placeholder */
        .ref-img{width:200px;height:140px;background:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
        .ref-img img{width:100%;height:100%;object-fit:cover}
        /* Results */
        .res-hdr{background:#A20F0F;color:#fff}
    </style>
</head>
<body class="m-0 p-0 bg-[#f5f5f5] text-gray-800">

                    <!-- REPLACE: Bell icon -->
                    <button class="relative hover:text-[#A20F0F] transition-colors cursor-pointer"><svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg><span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-[#A20F0F] rounded-full border-2 border-white"></span></button>
                </div>
                <div class="w-px h-8 bg-gray-200"></div>
                <div class="flex items-center gap-2 cursor-pointer">
                    <div class="w-9 h-9 rounded-full border-2 border-[#A20F0F] overflow-hidden flex items-center justify-center bg-white">
                        <!-- REPLACE: Avatar -->
                        <svg class="w-5 h-5 text-[#A20F0F]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                    </div>

                <div class="w-px h-8 bg-gray-200"></div>

                    <!-- REPLACE: Logout icon -->
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3-3l3-3m0 0l-3-3m3 3H9"/></svg>

    <div class="w-full h-[2px] bg-[#00e5d0]"></div>

function renderSetup() {

            <div class="text-xs text-gray-500"><p class="font-medium text-gray-700">Age</p><p>27</p></div>
        </div>
    </div>
    <!-- Results Table -->
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
        <div class="grid grid-cols-[150px_1fr_180px_200px] res-hdr text-sm font-semibold">
            <div class="px-4 py-3">Test</div><div class="px-4 py-3">Test Description</div><div class="px-4 py-3">Test Outcome</div><div class="px-4 py-3">Result</div>
        </div>
        ${rows.map(r => r.tests.map((t,i) => `
        <div class="grid grid-cols-[150px_1fr_180px_200px] border-b border-gray-100 hover:bg-gray-50 text-sm">
            <div class="px-4 py-3 ${i===0?'font-medium text-gray-700':'text-gray-400'}">${i===0?r.cat:''}</div>
            <div class="px-4 py-3 text-gray-600">${t.desc}</div>
            <div class="px-4 py-3"><span class="text-green-600 italic">${t.outcome}</span></div>
            <div class="px-4 py-3 font-medium">${t.result}</div>
        </div>`).join('')).join('')}
    </div>
    <div class="flex items-center justify-between">
        <p class="text-lg font-semibold">Test Results</p>
        <button onclick="alert('Generating report...')" class="px-8 py-2.5 bg-[#A20F0F] text-white rounded-lg font-medium hover:bg-[#8a0d0d] transition text-sm cursor-pointer flex items-center gap-2">
            <!-- REPLACE: Clock/Report icon -->
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Complete Test
        </button>
    </div>`;
}

// ============================================================
// MAIN RENDER
// ============================================================
function renderTest(idx) {
    const t = TESTS[idx];
    let examHtml = '';
    switch(t.type) {
        case 'acuity-3x3': examHtml = renderAcuity3x3(t); break;
        case 'acuity-near': examHtml = renderAcuityNear(t); break;
        case 'colour': examHtml = renderColour(t); break;
        case 'phoria': examHtml = renderPhoria(); break;
        case 'fusion': examHtml = renderFusion(); break;
        case 'stereopsis': examHtml = renderStereopsis(); break;
        case 'peripheral': examHtml = renderPeripheral(); break;
        case 'peripheral-vert': examHtml = renderPeripheralVert(); break;
        case 'contrast': examHtml = renderContrast(); break;
        case 'glare': examHtml = renderGlare(); break;
    }
    app.innerHTML = renderStepper() + `
        <h2 class="text-2xl font-semibold text-gray-900 mb-6">${t.title}</h2>
        ${renderQuestionBox(t)}
        ${examHtml}
        ${renderNav()}`;
    window.scrollTo({top:0,behavior:'smooth'});
}

// ============================================================
// INTERACTIONS
// ============================================================
function goTest(idx) {
    currentTest = idx;
    renderTest(idx);
}

function showResults() {
    currentTest = 15;
    renderResults();
    window.scrollTo({top:0,behavior:'smooth'});
}

function cancelTest() {
    currentTest = -1;
    renderSetup();
    window.scrollTo({top:0,behavior:'smooth'});
}

function pickCard(el) {
    const section = el.closest('.grid');
    section.querySelectorAll('.acu-card,.nr-card').forEach(c => c.classList.remove('picked'));
    el.classList.add('picked');
    results[currentTest] = el.dataset.value;
}

function pickResp(el) {
    const parent = el.parentElement;
    parent.querySelectorAll('.resp-btn,.fusion-card,.shape-card,.contrast-card,.nr-card').forEach(c => c.classList.remove('picked'));
    el.classList.add('picked');
    results[currentTest] = el.dataset.value;
}

function pickPhoria(el, groupId) {
    document.getElementById(groupId).querySelectorAll('.ph-dot').forEach(d => d.classList.remove('picked'));
    el.classList.add('picked');
}

function pickMed(el) {
    document.querySelectorAll('.med-card').forEach(c => c.classList.remove('picked'));
    el.classList.add('picked');
}

function toggleCb(label) {
    const cb = label.querySelector('.cb');
    cb.classList.toggle('on');
}

function toggleLight(btn) {
    btn.classList.toggle('on');
}

// Timer for glare test
let timerInterval = null;
let timerMs = 0;
function startTimer() {
    if(timerInterval) return;
    timerMs = 0;
    timerInterval = setInterval(() => {
        timerMs += 10;
        const s = Math.floor(timerMs/1000);
        const ms = Math.floor((timerMs%1000)/10);
        const el = document.getElementById('timer-display');
        if(el) el.innerHTML = `${String(s).padStart(2,'0')}<span class="text-2xl text-gray-400">.${String(ms).padStart(2,'0')}s</span>`;
        if(timerMs >= 5000) { clearInterval(timerInterval); timerInterval = null; }
    }, 10);
}

function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerMs = 0;
    const el = document.getElementById('timer-display');
    if(el) el.innerHTML = `00<span class="text-2xl text-gray-400">.00s</span>`;
}

// Initialize
renderSetup();
</script>
</body>
</html>
